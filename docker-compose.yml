version: '3.8'
services:
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: cloudmall-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - JVM_XMS=96m
      - JVM_XMX=192m
      - JVM_XMN=48m
    ports:
      - "8848:8848"
      - "9848:9848"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M
