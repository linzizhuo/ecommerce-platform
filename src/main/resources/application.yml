server:
  port: 8080
  tomcat:
    threads:
      max: 200          # Tomcat最大工作线程（默认200）
      min-spare: 10     # 最小空闲线程
    accept-count: 100   # 等待队列长度，满了直接拒绝
    connection-timeout: 5000ms  # 连接超时

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:13306/ecommerce?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50       # 连接池最大连接数（默认10，高并发不够）
      minimum-idle: 10            # 最少保持10个空闲连接
      connection-timeout: 3000    # 等待连接超时3秒
      idle-timeout: 600000        # 空闲连接10分钟后回收
      max-lifetime: 1800000       # 连接最大存活30分钟

  # Redis
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      password: 01star
      lettuce:
        pool:
          max-active: 50          # Redis连接池最大连接数
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms        # 等连接超时

  # 去掉Thymeleaf → 纯REST API
  thymeleaf:
    enabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Knife4j API文档
springdoc:
  swagger-ui:
    path: /doc.html
