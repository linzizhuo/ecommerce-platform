server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://192.168.0.181:3306/ecommerce?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: 192.168.0.181
      port: 6379
      password: 01star
      lettuce:
        pool:
          max-active: 2
          max-idle: 2
          min-idle: 1
          max-wait: 3000ms

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://192.168.0.181:6379"
          password: "01star"
          connectionPoolSize: 2
          connectionMinimumIdleSize: 1

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
    sentinel:
      transport:
        dashboard: 127.0.0.1:8080
      eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.cloudmall: INFO

